{% extends 'index.html' %}
{% load static %}
{% block body %}

{% if error == "pat1" %}
<script>
    alert('logged in successfully');
    window.location="{% url 'patient_home' %}";
</script>
{% endif %}

{% if error == "notmember" %}
<script>
    alert('Your information verification is pending. Please login later');
    window.location="{% url 'logout' %}";
</script>
{% endif %}

{% if error == "pat2" %}
<script>
    alert('logged in successfully');
    window.location="{% url 'doctor_home' %}";
</script>
{% endif %}

{% if error == "not" %}
<script>
    alert('Username & Password are not Matching');
</script>
{% endif %}

<!-- LOGIN FORM -->
<section class="logins py-5">
    <div class="container py-xl-5 py-lg-3">
        <div class="title-section mb-md-5 mb-4">
            <center>
                <h3 class="w3ls-title text-uppercase text-dark font-weight-bold">Login</h3>
            </center>
        </div>
        <hr/>

        <div class="login px-sm-4 mx-auto mw-100 login-wrapper">
            <form action="" method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" class="form-control" name="uname" placeholder="Enter Username" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" name="pwd" placeholder="Enter Password" required>
                </div>

                <button type="submit" class="btn submit mt-4" style="background-color:#605d5d;">
                    Login
                </button>

                <p class="text-center mt-5">
                    <a href="{% url 'signup' %}">
                        Don't have an Account? 
                        <span style="color:#61bbb9;font-weight:bolder;">Register here</span>
                    </a>
                </p>
            </form>
        </div>
    </div>
</section>

{% endblock %}
